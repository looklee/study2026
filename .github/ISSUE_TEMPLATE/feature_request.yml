---
name: 💡 Feature Request
description: 提出新功能建议
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出新功能建议！请填写以下信息。
  
  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 您的功能请求是否与某个问题相关？
      placeholder: 例如：我经常感到困扰的是...
    validations:
      required: false
  
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述您希望看到的功能
      placeholder: 例如：我希望可以...
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 您考虑过的其他解决方案
    validations:
      required: false
  
  - type: textarea
    id: context
    attributes:
      label: 附加信息
      description: 任何其他背景信息、截图或示例
  
  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我已搜索现有 issues，没有重复的建议
          required: true
