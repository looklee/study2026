# GitHub Actions CI/CD for Study2026

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ==================== 前端检查和构建 ====================
  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json
    
    - name: Install dependencies
      working-directory: apps/web
      run: npm ci
    
    - name: Lint
      working-directory: apps/web
      run: npm run lint --if-present
    
    - name: Type check
      working-directory: apps/web
      run: npm run typecheck --if-present
    
    - name: Build
      working-directory: apps/web
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: apps/web/.next
        retention-days: 7

  # ==================== 后端检查和测试 ====================
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: apps/api
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx
    
    - name: Lint with flake8
      working-directory: apps/api
      run: |
        pip install flake8
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Test with pytest
      working-directory: apps/api
      run: |
        pytest --cov=app --cov-report=xml || true
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./apps/api/coverage.xml
        flags: backend
        name: codecov-backend

  # ==================== Docker 构建 ====================
  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./apps/api
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/study2026-api:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/study2026-api:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/study2026-api:buildcache,mode=max
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./apps/web
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/study2026-web:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/study2026-web:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/study2026-web:buildcache,mode=max
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

  # ==================== 部署 ====================
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to production
      run: |
        echo "Deployment step - Configure according to your deployment target"
        # 这里可以添加部署到云平台的步骤
        # 例如：AWS, GCP, Azure, Vercel, Railway 等
